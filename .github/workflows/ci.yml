name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dependency-audit:
    name: Dependency Audit (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Frontend
            working-directory: .
            cache-dependency-path: package-lock.json
          - name: Backend
            working-directory: backend
            cache-dependency-path: backend/package-lock.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.cache-dependency-path }}

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.working-directory }}

      # Threshold policy:
      # - High and critical vulnerabilities fail CI.
      # - Moderate and below remain visible in audit output but are non-blocking.
      - name: Run dependency audit
        run: npm audit --audit-level=high
        working-directory: ${{ matrix.working-directory }}

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend unit tests
        run: npm test -- --run

      - name: Frontend typecheck
        run: npx tsc --noEmit --skipLibCheck

      - name: Frontend build
        run: npm run build

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Backend unit tests
        run: npm test -- --run
        working-directory: backend

      - name: Backend lint
        run: npm run lint
        working-directory: backend

      - name: Backend build
        run: npm run build
        working-directory: backend

  docker-build:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f Dockerfile .

      - name: Build backend image
        run: docker build -f backend/Dockerfile backend
