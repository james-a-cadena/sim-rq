name: E2E

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start development stack
        run: docker compose -p sim-rq-dev -f docker-compose.dev.yaml up -d --build

      - name: Run Playwright E2E
        run: make test-e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

      - name: Stop development stack
        if: always()
        run: docker compose -p sim-rq-dev -f docker-compose.dev.yaml down -v
